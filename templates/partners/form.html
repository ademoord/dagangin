{% extends 'base.html' %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ title }}</h1>
  <a href="{{ url_for('partners.index') }}" class="btn btn-secondary">Kembali</a>
</div>

<div class="card card-body" style="max-width:640px;">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if next_url %}
    <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}

    <div class="form-group">
      <label for="name">Nama Mitra</label>
      <input class="form-control" id="name" name="name" value="{{ partner.name if partner else '' }}" required autofocus>
    </div>

    <div class="form-group">
      <label>Peran</label>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:0.375rem;font-weight:500;">
          <input type="checkbox" name="is_customer" {% if not partner or partner.is_customer %}checked{% endif %}>
          Pelanggan
        </label>
        <label style="display:flex;align-items:center;gap:0.375rem;font-weight:500;">
          <input type="checkbox" name="is_supplier" {% if not partner or partner.is_supplier %}checked{% endif %}>
          Vendor
        </label>
      </div>
      <p class="text-muted" style="font-size:0.75rem;margin-top:0.375rem;">Mitra bisa jadi pelanggan, vendor, atau keduanya.</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="phone">Telepon</label>
        <input class="form-control" id="phone" name="phone" value="{{ partner.phone if partner and partner.phone else '' }}">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" value="{{ partner.email if partner and partner.email else '' }}">
      </div>
    </div>

    <div class="form-group">
      <label for="address">Alamat</label>
      <textarea class="form-control" id="address" name="address" rows="3">{{ partner.address if partner and partner.address else '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="notes">Catatan</label>
      <input class="form-control" id="notes" name="notes" value="{{ partner.notes if partner and partner.notes else '' }}">
    </div>

    <button type="submit" class="btn btn-primary">Simpan</button>
    {% if partner %}
    <button formaction="{{ url_for('partners.delete', partner_id=partner.id) }}" formmethod="post" class="btn btn-secondary" onclick="return confirm('Hapus mitra ini?')">Hapus</button>
    {% endif %}
  </form>
</div>
{% endblock %}
