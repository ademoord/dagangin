{% extends 'base.html' %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Buat Faktur</h1>
  <a href="{{ url_for('invoicing.index') }}" class="btn btn-secondary">Kembali</a>
</div>

<div class="card card-body">
  <form method="post" x-data="{ lines: [{ product_id: '', quantity: 1, unit_price: 0 }] }">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <div class="form-group">
        <label for="partner_id">Mitra (Pelanggan)</label>
        <select class="form-control" id="partner_id" name="partner_id" required>
          <option value="">Pilih mitra pelanggan</option>
          {% for p in partners %}
          <option value="{{ p.id }}">{{ p.name }}{% if p.phone %} · {{ p.phone }}{% endif %}</option>
          {% endfor %}
        </select>
        <p class="text-muted mt-1" style="font-size:0.75rem;">
          Belum ada? <a href="{{ url_for('partners.add', next=url_for('invoicing.add')) }}">Tambah mitra baru</a>
        </p>
      </div>
      <div class="form-group">
        <label for="due_days">Jatuh Tempo (hari)</label>
        <input class="form-control" type="number" id="due_days" name="due_days" value="14" min="1">
      </div>
    </div>
    <div class="form-group">
      <label for="notes">Catatan</label>
      <input class="form-control" id="notes" name="notes">
    </div>

    <h3 style="font-size:1rem;margin:1.5rem 0 1rem;">Item Faktur</h3>
    <template x-for="(line, index) in lines" :key="index">
      <div class="form-row" style="align-items:end;">
        <div class="form-group">
          <label>Produk</label>
          <select class="form-control" name="product_id" x-model="line.product_id" required>
            <option value="">Pilih produk</option>
            {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }} — {{ p.price | rupiah }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Jumlah</label>
          <input class="form-control" type="number" name="quantity" min="1" x-model="line.quantity">
        </div>
        <div class="form-group">
          <label>Harga/Unit</label>
          <input class="form-control" type="number" name="unit_price" min="0" x-model="line.unit_price">
        </div>
      </div>
    </template>
    <button type="button" class="btn btn-secondary btn-sm mt-1" @click="lines.push({ product_id: '', quantity: 1, unit_price: 0 })">+ Tambah Baris</button>
    <div class="mt-2">
      <button type="submit" class="btn btn-primary">Simpan Faktur</button>
    </div>
  </form>
</div>
{% endblock %}
